display_information:
  name: Niah
  description: "Niah stands for Needle in a Haystack. Ask Slack to query your DB with an AI analyst and get tables, CSVs, and plots."
  background_color: "#2E4057"

features:
  bot_user:
    display_name: Niah
    always_online: true
  slash_commands:
    - command: /dd
      url: https://YOUR-NGROK-DOMAIN/slack/sqlquery
      description: Ask a data question; bot generates SQL and returns results
      usage_hint: "top 10 customers by spend <2>"
      should_escape: false
    - command: /askdb
      url: https://YOUR-NGROK-DOMAIN/slack/askdb
      description: Ask business questions - AI investigates using multiple queries
      usage_hint: "why did sales drop last month?"
      should_escape: false
    - command: /datastory
      url: https://YOUR-NGROK-DOMAIN/slack/datastory
      description: Create comprehensive data stories with AI-generated visualizations
      usage_hint: "tell me about customer behavior trends"
      should_escape: false
    - command: /help
      url: https://YOUR-NGROK-DOMAIN/slack/help
      description: Help for Niah
      should_escape: false
oauth_config:
  scopes:
    bot:
      - chat:write
      - chat:write.public
      - files:write
      - commands
settings:
  event_subscriptions:
    request_url: https://YOUR-NGROK-DOMAIN/slack/events   # not used now; safe placeholder
    bot_events: []
  interactivity:
    is_enabled: true
    request_url: https://YOUR-NGROK-DOMAIN/slack/interactions
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
